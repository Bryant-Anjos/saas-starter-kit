<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- Primary meta — update these before launching -->
    <title>Starter App</title>
    <meta name="description" content="A polished SaaS starting point." />
    <link rel="canonical" href="https://your-app.example.com/" />

    <!-- Hreflang: same URL for all languages (client-side i18n) -->
    <link rel="alternate" hreflang="en"        href="https://your-app.example.com/" />
    <link rel="alternate" hreflang="pt-BR"     href="https://your-app.example.com/" />
    <link rel="alternate" hreflang="x-default" href="https://your-app.example.com/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Starter App" />
    <meta property="og:url"         content="https://your-app.example.com/" />
    <meta property="og:title"       content="Starter App" />
    <meta property="og:description" content="A polished SaaS starting point." />
    <meta property="og:image"       content="https://your-app.example.com/og-image.svg" />
    <meta property="og:image:type"  content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="en_US" />
    <meta property="og:locale:alternate" content="pt_BR" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://your-app.example.com/" />
    <meta name="twitter:title"       content="Starter App" />
    <meta name="twitter:description" content="A polished SaaS starting point." />
    <meta name="twitter:image"       content="https://your-app.example.com/og-image.svg" />

    <!-- Search engine site verification
         Obtain codes from Google Search Console and Bing Webmaster Tools,
         then uncomment and fill in the values.
    <meta name="google-site-verification" content="REPLACE_WITH_GOOGLE_CODE" />
    <meta name="msvalidate.01"            content="REPLACE_WITH_BING_CODE" />
    -->

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://your-app.example.com/#website",
          "name": "Starter App",
          "url": "https://your-app.example.com/"
        },
        {
          "@type": "WebApplication",
          "@id": "https://your-app.example.com/#webapp",
          "name": "Starter App",
          "url": "https://your-app.example.com/",
          "description": "A polished SaaS starting point.",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "inLanguage": ["en", "pt-BR"],
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          }
        }
      ]
    }
    </script>

    <!-- Theme init: runs before React to prevent flash of wrong theme -->
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
